<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" 
    />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BoooBs</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
      
      div{
        margin: 0.4em;
      }
      h1{
        margin: 1em;
        padding: 1em;
      }
      .g-recaptcha {
        display: inline-block;
      }
      
  </style>
    
    
  </head>
  <body>
    
    <div class="container text-center">
      <div class="row">
        <div class="col-lg-6 mx-auto">
          
          <h1 class="fw-light">Привет, этот сайт меняет картинки </h1>
          <form action="{{ url_for('resize') }}" method="post" enctype="multipart/form-data">
          <label for="file"></label>
          <input type="file" name="file" id="file" required><br><br>
          <label for="resize">resize level:</label>
          <input type="number" name="resize" id="resize" min="1" max="2" step="0.1" value="1" required><br><br>
          <div class="g-recaptcha" data-sitekey="{{ sitekey }}"></div><br><br>
          <input class = "btn btn-primary" type="submit" value="Submit">
          
          </form>

        </div>
      </div>
      
    </div>

  </body>
</html>
